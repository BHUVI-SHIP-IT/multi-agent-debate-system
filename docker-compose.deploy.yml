services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: debate
      POSTGRES_PASSWORD: debate
      POSTGRES_DB: debate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debate -d debate_db"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_URL: http://ollama:11434/api/embeddings
      MAX_CONCURRENT_DEBATES: ${MAX_CONCURRENT_DEBATES:-64}
      NODE_EXECUTOR_WORKERS: ${NODE_EXECUTOR_WORKERS:-32}
      STREAM_DISPATCH_DELAY_SECONDS: ${STREAM_DISPATCH_DELAY_SECONDS:-0}
      TAVILY_CACHE_TTL_SECONDS: ${TAVILY_CACHE_TTL_SECONDS:-900}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      REDIS_URL: redis://redis:6379/0
      STATE_STORE: postgres
      STATE_STORE_PATH: postgresql://debate:debate@postgres:5432/debate_db
      CHECKPOINTER_BACKEND: postgres
      CHECKPOINTER_DSN: postgresql://debate:debate@postgres:5432/debate_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  ollama_data:
  chroma_data:

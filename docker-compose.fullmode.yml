services:
  redis:
    image: redis:7-alpine
    container_name: debate-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: debate-postgres
    environment:
      POSTGRES_USER: debate
      POSTGRES_PASSWORD: debate
      POSTGRES_DB: debate_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debate -d debate_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
